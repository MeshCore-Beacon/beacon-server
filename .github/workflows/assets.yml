on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: ./build-release.sh
      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: binaries/*
